<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeetCode Visualizer</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <div class="header-top">
          <h1>LeetCode Visualizer</h1>
          <div class="lang-switch">
            <button id="langVi" class="lang-btn active" data-lang="vi">VI</button>
            <button id="langEn" class="lang-btn" data-lang="en">EN</button>
          </div>
        </div>
        <p class="subtitle" data-i18n="subtitle">Nhập số bài LeetCode để xem thuật toán chạy từng bước</p>
      </header>

      <section class="search">
        <label for="problemId" data-i18n="problemIdLabel">Số bài LeetCode</label>
        <div class="search-row">
          <input id="problemId" type="number" placeholder="vd: 1846" value="1846" />
          <button id="loadBtn" data-i18n="loadBtn">Tải bài</button>
        </div>
        <p id="searchError" class="error hidden"></p>
      </section>

      <section id="catalog" class="catalog"></section>

      <section id="problemPanel" class="panel hidden">
        <div class="problem-head">
          <span id="problemId2" class="badge"></span>
          <h2 id="problemTitle"></h2>
        </div>
        <p id="problemTitleVi" class="title-vi"></p>
        <p id="problemStatement" class="statement"></p>

        <div id="complexity" class="complexity hidden">
          <div class="cx-row">
            <span class="cx-label" data-i18n="timeLabel">Thời gian</span>
            <span id="cxTime" class="cx-badge"></span>
            <span class="cx-label" data-i18n="spaceLabel">Bộ nhớ</span>
            <span id="cxSpace" class="cx-badge"></span>
          </div>
          <p id="cxNote" class="cx-note"></p>
        </div>

        <div class="input-row">
          <label id="arrLabel" for="arrInput" data-i18n="arrLabel">Mảng đầu vào (cách nhau bởi dấu phẩy)</label>
          <input id="arrInput" type="text" placeholder="2,2,1,2,1" />
          <div id="extraParams" class="extra-params"></div>
          <button id="runBtn" class="run-btn" data-i18n="runBtn">Trực quan hóa</button>
          <p id="runError" class="error hidden"></p>
        </div>
      </section>

      <section id="vizPanel" class="panel hidden">
        <div class="viz-head">
          <h3 id="stepTitle"></h3>
          <span id="stepCounter" class="badge"></span>
        </div>

        <div id="vizComplexity" class="viz-complexity hidden">
          <span class="cx-label" data-i18n="timeLabel">Thời gian</span>
          <span id="vizCxTime" class="cx-badge"></span>
          <span class="cx-label" data-i18n="spaceLabel">Bộ nhớ</span>
          <span id="vizCxSpace" class="cx-badge"></span>
        </div>

        <div id="bars" class="bars"></div>

        <p id="stepNote" class="note"></p>

        <pre id="codePanel" class="code-panel"></pre>

        <div class="controls">
          <button id="firstBtn" data-i18n="first">⏮</button>
          <button id="prevBtn" data-i18n="prev">◀ Lùi</button>
          <button id="playBtn" data-i18n="play">▶ Chạy</button>
          <button id="nextBtn" data-i18n="next">Tiến ▶</button>
          <button id="lastBtn" data-i18n="last">⏭</button>
        </div>

        <p id="kbdHint" class="kbd-hint" data-i18n="kbdHint"></p>

        <div id="answer" class="answer hidden"></div>
      </section>
    </div>

    <script src="script.js"></script>
  </body>
</html>
